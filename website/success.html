<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Payment Success - Narayani Waterpark</title>
  <style>
    body { font-family: 'Outfit', sans-serif; background: #e8eef7; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    .card { background: white; padding: 40px; border-radius: 20px; text-align: center; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
    .icon { font-size: 60px; color: #4CAF50; margin-bottom: 20px; }
    h1 { margin: 0 0 10px; color: #222; }
    p { color: #555; margin: 0 0 20px; }
    .btn { display: inline-block; padding: 12px 24px; background: #0a4fa0; color: white; text-decoration: none; border-radius: 30px; font-weight: 600; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✅</div>
    <h1>Payment Successful!</h1>
    <p>Your booking has been confirmed.<br/>A confirmation email has been sent.</p>
    <div id="details" style="background:#f5f8fc;padding:15px;border-radius:10px;margin-bottom:20px;font-size:0.9rem;text-align:left;"></div>
    <a href="/" class="btn">Back to Home</a>
  </div>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const txnId = urlParams.get('txnId');
    const amount = urlParams.get('amount');
    if(txnId) {
      document.getElementById('details').innerHTML = `<strong>Transaction ID:</strong> ${txnId}<br/><strong>Amount Paid:</strong> ₹${amount}`;
    } else {
      document.getElementById('details').style.display = 'none';
    }
  </script>
</body>
</html>
